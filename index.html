<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealMatch | Find Your Perfect Meal</title>
    <style>
        /* --- CSS VARIABELEN (Light Mode standaar) --- */
        :root {
            --bg: #ffffff;
            --header-bg: #ffffff;
            --drawer-bg: #ffffff;
            --modal-bg: #ffffff;
            --input-bg: #ffffff;
            --input-border: #eeeeee;
            
            --text: #333333;
            --text-muted: #999999;
            
            --mm-green: #4CAF50; 
            --mm-orange: #FF9800;
            --btn-save-text: #ffffff;
            
            --block-ontbijt-bg: #eef7ee; --block-ontbijt-border: #c8e6c9;
            --block-lunch-bg: #fff3e0; --block-lunch-border: #ffe0b2;
            --block-avondeten-bg: #f1f8e9; --block-avondeten-border: #dcedc8;
            
            --recipe-btn-bg: #333333; --recipe-btn-text: #ffffff;
            --nav-link-border: #f9f9f9;
            --overlay-bg: rgba(0,0,0,0.1);
            
            --shadow-md: 0 10px 30px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.1);
            
            --speed: 0.4s;
        }

        /* --- DARK MODE VARIABELEN --- */
        [data-theme="dark"] {
            --bg: #121212;
            --header-bg: #121212;
            --drawer-bg: #1e1e1e;
            --modal-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            --input-border: #444444;
            
            --text: #e0e0e0;
            --text-muted: #888888;
            
            --mm-green: #81C784; /* Iets lichter groen voor contrast */
            --mm-orange: #FFB74D; /* Iets lichter oranje voor contrast */
            --btn-save-text: #121212;
            
            /* Subtielere achtergronden voor Dark Mode blokken */
            --block-ontbijt-bg: #1a2e1a; --block-ontbijt-border: #2e7d32;
            --block-lunch-bg: #2e2314; --block-lunch-border: #ef6c00;
            --block-avondeten-bg: #1e2814; --block-avondeten-border: #558b2f;
            
            --recipe-btn-bg: #e0e0e0; --recipe-btn-text: #121212;
            --nav-link-border: #2d2d2d;
            --overlay-bg: rgba(0,0,0,0.5); /* Donkerdere overlay */
            
            --shadow-md: 0 10px 30px rgba(0,0,0,0.2);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.4);
            
            /* Logo filter om het wit in het logo minder fel te maken */
            --logo-filter: brightness(0.8) contrast(1.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- THEME TOGGLE KNOP --- */
        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1001;
            cursor: pointer;
            background: none;
            border: none;
            padding: 10px;
            font-size: 1.2rem;
            color: var(--text);
            transition: color 0.3s ease, transform 0.3s ease;
        }
        
        .theme-toggle:active { transform: scale(1.1); }
        
        /* Toon maan in light mode, zon in dark mode */
        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        
        [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        /* --- HAMBURGER MENU --- */
        .menu-btn {
            position: fixed;
            top: 25px; left: 25px;
            z-index: 1001;
            cursor: pointer;
            background: none; border: none; padding: 10px;
        }

        .menu-btn div {
            width: 24px; height: 2px;
            background: var(--mm-green);
            margin: 6px 0;
            transition: background-color 0.3s ease;
        }

        .drawer {
            position: fixed;
            top: 0; left: 0; width: 300px; height: 100%;
            background-color: var(--drawer-bg);
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform var(--speed) cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s ease;
            box-shadow: var(--shadow-md);
            padding: 70px 25px 30px;
            display: flex; flex-direction: column;
            overflow-y: auto;
        }

        .drawer.active { transform: translateX(0); }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--overlay-bg);
            backdrop-filter: blur(2px);
            display: none; z-index: 999;
            transition: background-color 0.3s ease;
        }
        .overlay.active { display: block; }

        /* --- HEADER & LOGO --- */
        header {
            padding: 30px 20px 10px;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--header-bg);
            transition: background-color 0.3s ease;
        }

        .logo-img { 
            max-width: 260px; height: auto; 
            filter: var(--logo-filter, none);
            transition: filter 0.3s ease;
        }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 15px; padding: 0 25px 40px;
        }

        .block-wrapper {
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center;
        }

        .action-block {
            width: 100%; height: 100px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 24px; cursor: pointer;
            text-align: center; padding: 20px;
            transition: transform 0.2s ease, background-color 0.3s ease, border-color 0.3s ease;
        }

        .block-ontbijt { background-color: var(--block-ontbijt-bg); border: 1px solid var(--block-ontbijt-border); }
        .block-lunch { background-color: var(--block-lunch-bg); border: 1px solid var(--block-lunch-border); }
        .block-avondeten { background-color: var(--block-avondeten-bg); border: 1px solid var(--block-avondeten-border); }

        .action-block h2 { 
            font-weight: 500; font-size: 1.3rem; letter-spacing: 1px;
            margin: 0; text-transform: lowercase; 
            color: var(--text);
            transition: opacity 0.3s ease, color 0.3s ease;
        }

        .fade-out { opacity: 0; }

        .recipe-btn {
            margin-top: 8px;
            background-color: var(--recipe-btn-bg);
            color: var(--recipe-btn-text);
            border: none; padding: 6px 14px;
            border-radius: 20px; font-size: 0.7rem;
            cursor: pointer; opacity: 0; transform: translateY(-5px);
            transition: all 0.3s ease; pointer-events: none;
        }

        .recipe-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        /* --- MODALS --- */
        .recipe-modal {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 85%; max-width: 400px; 
            background-color: var(--modal-bg);
            border-radius: 24px; padding: 30px;
            box-shadow: var(--shadow-lg);
            z-index: 2000; opacity: 0; visibility: hidden;
            transition: all 0.3s ease, background-color 0.3s ease;
        }

        .recipe-modal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }

        .share-icon {
            cursor: pointer; width: 24px; height: 24px; 
            fill: var(--mm-orange);
            transition: transform 0.2s, fill 0.3s ease;
        }
        .share-icon:active { transform: scale(1.2); }

        /* --- DRAWER FORM & LINKS --- */
        select, input, textarea {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border: 1px solid var(--input-border); 
            border-radius: 12px; 
            font-family: inherit; font-size: 0.9rem;
            background-color: var(--input-bg);
            color: var(--text);
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        
        .btn-save {
            background-color: var(--mm-green); 
            color: var(--btn-save-text);
            border: none;
            padding: 14px; width: 100%; border-radius: 12px; font-weight: 600; cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .nav-link { 
            padding: 14px 0; 
            border-bottom: 1px solid var(--nav-link-border);
            cursor: pointer; font-size: 0.85rem; 
            color: var(--text);
            transition: border-color 0.3s ease, color 0.3s ease;
        }
        .nav-disabled { opacity: 0.4; cursor: default; }

        .logout-link { color: #d32f2f; font-weight: 600; margin-top: 20px; }
        [data-theme="dark"] .logout-link { color: #ef5350; } /* Iets lichter rood voor Dark Mode */
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Schakel Dark Mode">
        <span class="icon-moon">🌙</span>
        <span class="icon-sun">☀️</span>
    </button>

    <button class="menu-btn" onclick="toggleMenu()" aria-label="Menu">
        <div></div><div></div>
    </button>

    <div class="overlay" id="overlay" onclick="toggleMenu(); closeRecipe();"></div>

    <nav class="drawer" id="drawer">
        <h3 style="color:var(--mm-green); margin-bottom: 5px;">MealMatch</h3>
        <p style="font-size: 0.7rem; color: var(--text-muted); margin-bottom: 20px;">Versie 1.0</p>

        <div class="input-group">
            <select id="cat-select">
                <option value="ontbijt">Ontbijt</option>
                <option value="lunch">Lunch</option>
                <option value="avondeten">Avondeten</option>
            </select>
            <input type="text" id="recipe-name" placeholder="Naam gerecht">
            <textarea id="recipe-desc" placeholder="Ingrediënten / Bereiding" rows="3"></textarea>
            <button class="btn-save" onclick="saveRecipe()">Gerecht Opslaan</button>
        </div>

        <div style="margin-top: 25px;">
            <div class="nav-link nav-disabled">👤 Profiel</div>
            <div class="nav-link nav-disabled">🌍 Community</div>
            <div class="nav-link nav-disabled">⚙️ Instellingen</div>
            <div class="nav-link nav-disabled">❓ Help & Support</div>
            <div class="nav-link nav-disabled">⚖️ Algemene Voorwaarden</div>
            <div class="nav-link logout-link" onclick="alert('U bent afgemeld.')">🚪 Uitloggen</div>
        </div>
    </nav>

    <header>
        <img src="mealmatch.png" alt="MealMatch Logo" class="logo-img">
    </header>

    <main>
        <div class="block-wrapper">
            <div class="action-block block-ontbijt" onclick="getIdea('ontbijt', this)">
                <h2 id="label-ontbijt">ontbijt</h2>
            </div>
            <button class="recipe-btn" id="btn-ontbijt" onclick="showRecipe('ontbijt')">Bekijk Recept</button>
        </div>

        <div class="block-wrapper">
            <div class="action-block block-lunch" onclick="getIdea('lunch', this)">
                <h2 id="label-lunch">lunch</h2>
            </div>
            <button class="recipe-btn" id="btn-lunch" onclick="showRecipe('lunch')">Bekijk Recept</button>
        </div>

        <div class="block-wrapper">
            <div class="action-block block-avondeten" onclick="getIdea('avondeten', this)">
                <h2 id="label-avondeten">avondeten</h2>
            </div>
            <button class="recipe-btn" id="btn-avondeten" onclick="showRecipe('avondeten')">Bekijk Recept</button>
        </div>
    </main>

    <div class="recipe-modal" id="recipe-modal">
        <div class="modal-header">
            <h2 id="modal-name" style="margin:0; color:var(--mm-green); font-size: 1.4rem;"></h2>
            <svg class="share-icon" viewBox="0 0 24 24" onclick="alert('Link gekopieerd naar klembord!')">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92zM18 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM6 13c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm12 7.02c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
            </svg>
        </div>
        <p id="modal-desc" style="white-space: pre-wrap; line-height: 1.6; color: var(--text); font-size: 0.9rem; margin-bottom: 25px; max-height: 300px; overflow-y: auto;"></p>
        <button class="btn-save" onclick="closeRecipe()" style="background-color: var(--input-bg); color: var(--text); border: 1px solid var(--input-border);">Sluiten</button>
    </div>

    <script>
        // --- DATA & INITIALISATIE ---
        let db = JSON.parse(localStorage.getItem('mealmatch_vFinal_3')) || { ontbijt: [], lunch: [], avondeten: [] };
        let currentItem = null;

        // Laad opgeslagen thema voorkeur
        const savedTheme = localStorage.getItem('mealmatch_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // --- THEME FUNCTIE ---
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = (currentTheme === 'light') ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('mealmatch_theme', newTheme);
        }

        // --- MENU FUNCTIES ---
        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // --- RECEPT OPSLAAN ---
        function saveRecipe() {
            const cat = document.getElementById('cat-select').value;
            const name = document.getElementById('recipe-name').value;
            const desc = document.getElementById('recipe-desc').value;
            if(!name) return;
            db[cat].push({ name, desc });
            localStorage.setItem('mealmatch_vFinal_3', JSON.stringify(db));
            document.getElementById('recipe-name').value = '';
            document.getElementById('recipe-desc').value = '';
            toggleMenu();
        }

        // --- INSPIRATIE GENEREREN ---
        function getIdea(cat, element) {
            const label = element.querySelector('h2');
            const recipeBtn = document.getElementById('btn-' + cat);
            const items = db[cat];
            
            label.classList.add('fade-out');
            recipeBtn.classList.remove('visible');

            setTimeout(() => {
                if (items.length === 0) {
                    label.innerText = "voeg eerst gerechten toe.";
                } else {
                    const random = items[Math.floor(Math.random() * items.length)];
                    label.innerText = random.name;
                    currentItem = random;
                    recipeBtn.classList.add('visible');
                }
                label.classList.remove('fade-out');

                // Na 6 seconden reset naar categorie naam
                setTimeout(() => {
                    if(label.innerText !== cat) {
                        label.classList.add('fade-out');
                        recipeBtn.classList.remove('visible');
                        setTimeout(() => { label.innerText = cat; label.classList.remove('fade-out'); }, 300);
                    }
                }, 6000);
            }, 300);
        }

        // --- MODAL FUNCTIES ---
        function showRecipe() {
            if(!currentItem) return;
            document.getElementById('modal-name').innerText = currentItem.name;
            document.getElementById('modal-desc').innerText = currentItem.desc || "Geen details beschikbaar.";
            document.getElementById('recipe-modal').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeRecipe() {
            document.getElementById('recipe-modal').classList.remove('active');
            // Sluit overlay alleen als menu ook dicht is
            if(!document.getElementById('drawer').classList.contains('active')) {
                document.getElementById('overlay').classList.remove('active');
            }
        }
    </script>
</body>
</html>
